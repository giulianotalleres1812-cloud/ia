<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>J.A.R.V.I.S</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #00d4ff;
    --blue-dim: #0088aa;
    --gold: #ffd700;
    --red: #ff3333;
    --bg: #020a12;
    --panel: rgba(0, 212, 255, 0.05);
  }

  body {
    background: var(--bg);
    color: var(--blue);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  /* Corner decorations */
  .corner {
    position: fixed;
    width: 60px;
    height: 60px;
    z-index: 1;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--blue);
  }
  .corner::before { width: 100%; height: 2px; top: 0; }
  .corner::after  { width: 2px; height: 100%; top: 0; }
  .corner.tl { top: 16px; left: 16px; }
  .corner.tr { top: 16px; right: 16px; transform: scaleX(-1); }
  .corner.bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
  .corner.br { bottom: 16px; right: 16px; transform: scale(-1); }

  .ui {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 20px;
    text-align: center;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 8vw, 52px);
    font-weight: 900;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--blue);
    text-shadow: 0 0 20px var(--blue), 0 0 60px rgba(0,212,255,0.3);
  }

  .subtitle {
    font-size: clamp(11px, 3vw, 14px);
    letter-spacing: 0.2em;
    color: var(--blue-dim);
    text-transform: uppercase;
    margin-top: -20px;
  }

  /* Arc reactor button */
  .arc-btn {
    position: relative;
    width: 160px;
    height: 160px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .arc-btn .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--blue);
    animation: pulse-ring 2s ease-in-out infinite;
    opacity: 0.5;
  }
  .arc-btn .ring:nth-child(2) { inset: -12px; animation-delay: 0.5s; opacity: 0.3; }
  .arc-btn .ring:nth-child(3) { inset: -24px; animation-delay: 1s; opacity: 0.15; }

  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.03); opacity: 0.8; }
  }

  .arc-btn .core {
    position: absolute;
    inset: 16px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #00eeff, #0044aa, #001133);
    box-shadow: 0 0 30px var(--blue), inset 0 0 20px rgba(0,212,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }

  .arc-btn:active .core,
  .arc-btn.active .core {
    box-shadow: 0 0 60px var(--blue), 0 0 120px rgba(0,212,255,0.5), inset 0 0 30px rgba(0,212,255,0.6);
    transform: scale(1.05);
  }

  .arc-inner {
    width: 44px;
    height: 44px;
    background: conic-gradient(#00d4ff, #0088ff, #00d4ff);
    border-radius: 50%;
    animation: spin 4s linear infinite;
    box-shadow: 0 0 15px var(--blue);
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .status-label {
    font-family: 'Orbitron', monospace;
    font-size: clamp(10px, 3vw, 13px);
    letter-spacing: 0.15em;
    color: var(--blue-dim);
    text-transform: uppercase;
    min-height: 20px;
    transition: color 0.3s;
  }

  /* Clap meter */
  .meter-wrap {
    width: min(280px, 80vw);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .meter-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--blue-dim);
    text-align: left;
    text-transform: uppercase;
  }

  .meter-bar {
    height: 6px;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 3px;
    overflow: hidden;
  }

  .meter-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #0088ff, #00d4ff, #ffffff);
    border-radius: 3px;
    transition: width 0.05s ease-out;
    box-shadow: 0 0 8px var(--blue);
  }

  /* Message overlay */
  .msg-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,8,20,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
    gap: 24px;
    padding: 20px;
    text-align: center;
  }

  .msg-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .msg-line1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(13px, 4vw, 20px);
    letter-spacing: 0.2em;
    color: var(--blue-dim);
    text-transform: uppercase;
    animation: fadeUp 0.6s ease forwards;
    opacity: 0;
  }

  .msg-line2 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(22px, 7vw, 48px);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 30px var(--gold), 0 0 80px rgba(255,215,0,0.4);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    animation: fadeUp 0.6s 0.3s ease forwards;
    opacity: 0;
  }

  .msg-song {
    font-size: clamp(13px, 3.5vw, 18px);
    letter-spacing: 0.15em;
    color: var(--blue);
    text-transform: uppercase;
    animation: fadeUp 0.6s 0.6s ease forwards;
    opacity: 0;
  }

  .music-icon {
    font-size: 40px;
    animation: fadeUp 0.6s 0.9s ease forwards, bounce 1s 1.5s ease-in-out infinite;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* Permission screen */
  .perm-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    gap: 24px;
    padding: 32px;
    text-align: center;
  }

  .perm-screen.hidden { display: none; }

  .perm-title {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.15em;
  }

  .perm-text {
    font-size: 15px;
    color: var(--blue-dim);
    line-height: 1.6;
    max-width: 300px;
    letter-spacing: 0.05em;
  }

  .perm-btn {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    letter-spacing: 0.2em;
    padding: 14px 36px;
    border: 2px solid var(--blue);
    background: rgba(0,212,255,0.08);
    color: var(--blue);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .perm-btn:hover, .perm-btn:active {
    background: rgba(0,212,255,0.2);
    box-shadow: 0 0 20px rgba(0,212,255,0.3);
  }

  /* Scanline effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<!-- Permission screen -->
<div class="perm-screen" id="permScreen">
  <div class="perm-title">J.A.R.V.I.S</div>
  <div class="perm-text">
    Para detectar tus aplausos necesito acceso al micrófono.<br><br>
    Tocá el botón y aceptá el permiso cuando el navegador lo pida.
  </div>
  <button class="perm-btn" onclick="initAudio()">⚡ Activar sistema</button>
</div>

<!-- Corners -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- Main UI -->
<div class="ui">
  <div>
    <div class="logo">J.A.R.V.I.S</div>
    <div class="subtitle">Just A Rather Very Intelligent System</div>
  </div>

  <div class="arc-btn" id="arcBtn">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="core">
      <div class="arc-inner"></div>
    </div>
  </div>

  <div class="status-label" id="statusLabel">Sistema en espera</div>

  <div class="meter-wrap">
    <div class="meter-label">Nivel de audio</div>
    <div class="meter-bar">
      <div class="meter-fill" id="meterFill"></div>
    </div>
  </div>
</div>

<!-- Message overlay -->
<div class="msg-overlay" id="msgOverlay" onclick="hideMsg()">
  <div class="msg-line1">Buenos días,</div>
  <div class="msg-line2">SEÑOR</div>
  <div class="msg-song">♫ Should I Stay or Should I Go</div>
  <div class="music-icon">🎸</div>
</div>

<script>
let audioCtx, analyser, dataArray, micStream;
let listening = false;
let lastClapTime = 0;
let clapCount = 0;
let clapWindow = 1500; // ms to count claps
let firstClapTime = 0;
let triggered = false;
let animFrame;

const CLAP_THRESHOLD = 0.18;    // 0-1 sensitivity
const CLAPS_NEEDED = 2;         // 2 claps to trigger
const COOLDOWN = 4000;          // ms before can trigger again

async function initAudio() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    micStream = stream;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.3;
    dataArray = new Float32Array(analyser.frequencyBinCount);

    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);

    document.getElementById('permScreen').classList.add('hidden');
    listening = true;
    document.getElementById('statusLabel').textContent = 'Escuchando... aplaude 2 veces';
    loopAnalyse();
  } catch(e) {
    alert('No se pudo acceder al micrófono. Verificá los permisos del navegador.');
    console.error(e);
  }
}

function loopAnalyse() {
  animFrame = requestAnimationFrame(loopAnalyse);
  if (!analyser) return;

  analyser.getFloatTimeDomainData(dataArray);

  // RMS volume
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) sum += dataArray[i] * dataArray[i];
  const rms = Math.sqrt(sum / dataArray.length);

  // Meter display
  const pct = Math.min(rms * 400, 100);
  document.getElementById('meterFill').style.width = pct + '%';

  // Clap detection: sharp transient above threshold
  const now = Date.now();
  if (rms > CLAP_THRESHOLD && !triggered) {
    const timeSinceLast = now - lastClapTime;

    // Debounce: don't count same clap twice (min 150ms between counts)
    if (timeSinceLast > 150) {
      lastClapTime = now;

      if (clapCount === 0) {
        firstClapTime = now;
        clapCount = 1;
      } else {
        clapCount++;
      }

      flash();

      if (clapCount >= CLAPS_NEEDED && (now - firstClapTime) < clapWindow) {
        triggerJarvis();
        clapCount = 0;
      }
    }
  }

  // Reset clap count if window expired
  if (clapCount > 0 && (Date.now() - firstClapTime) > clapWindow) {
    clapCount = 0;
  }
}

function flash() {
  const btn = document.getElementById('arcBtn');
  btn.classList.add('active');
  setTimeout(() => btn.classList.remove('active'), 200);
}

function triggerJarvis() {
  triggered = true;
  document.getElementById('statusLabel').textContent = 'SISTEMA ACTIVADO';

  // Show overlay
  const overlay = document.getElementById('msgOverlay');
  overlay.classList.add('show');

  // Speak
  speak("Buenos días, señor.");

  // Play The Clash on YouTube (opens link after short delay)
  setTimeout(() => {
    playMusic();
  }, 2000);

  // Auto-hide overlay and reset
  setTimeout(() => {
    hideMsg();
    setTimeout(() => {
      triggered = false;
      clapCount = 0;
      document.getElementById('statusLabel').textContent = 'Escuchando... aplaude 2 veces';
    }, 500);
  }, 8000);
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-ES';
  u.rate = 0.85;
  u.pitch = 0.8;
  window.speechSynthesis.speak(u);
}

let lastSong = -1;

function playMusic() {
  if (micStream) {
    micStream.getTracks().forEach(track => track.stop());
  }
  if (audioCtx) {
    audioCtx.close();
  }
  listening = false;

  const songs = [
    'https://m.youtube.com/watch?v=xMaE6toi4mk',
    'https://youtu.be/j5rGm3kdTuk'
  ];
  lastSong = (lastSong + 1) % songs.length;
  const url = songs[lastSong];
  window.location.href = url;
}

function hideMsg() {
  document.getElementById('msgOverlay').classList.remove('show');
}

// Also allow manual tap on arc button (for testing)
document.getElementById('arcBtn').addEventListener('click', () => {
  if (!listening) return;
  clapCount++;
  flash();
  if (clapCount >= CLAPS_NEEDED) {
    triggerJarvis();
    clapCount = 0;
  }
});
</script>
</body>
</html>
